<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OWOW Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
  <body class="login-page">
  <main class="login">

    <div class="logo">
        <img src="images/owow-black 2.svg" alt="OWOW logo">
    </div>

    <h1>Sign in to your client portal</h1>
    <p class="subtitle">Welcome back to your OWOW client portal.</p>

    <form id="loginForm">

      <label>Email address</label>
      <input type="email" id="email" placeholder="client@example.com">

      <label>Password</label>
      <input type="password" id="password" placeholder="******">

      <div class="forgot">
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit">Sign in →</button>

    </form>

    <div class="divider">Or continue with</div>

    <div class="social">
        <button class="social-btn">
            <img src="images/google.svg" alt="Google">
            Google
    </button>

        <button class="social-btn">
            <img src="images/slack.svg" alt="Slack">
            Slack
        </button>
    </div>

    <p class="footer">
      Secure portal access. Need help?
      <a href="#">Contact Support</a>
    </p>

  </main>

  <script src="js/login.js"></script>
</body>
</html>
